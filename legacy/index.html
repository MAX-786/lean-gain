<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lean Gain — Muscle Gain Tracker</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app-shell">

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">LG</span>
      <span class="brand-name">Lean Gain</span>
    </div>
    <nav class="tabs" id="tabs">
      <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
      <button class="tab-btn" data-tab="mealplan">Meal Plan</button>
      <button class="tab-btn" data-tab="recipes">Recipes</button>
      <button class="tab-btn" data-tab="grocery">Grocery</button>
      <button class="tab-btn" data-tab="trackers">Trackers</button>
    </nav>
    <div class="topbar-actions">
      <button id="printBtn" class="icon-btn" title="Export / Print">⤓ Export</button>
      <button id="darkToggle" class="icon-btn" title="Toggle dark mode">🌙</button>
    </div>
  </header>

  <nav class="tabs tabs-mobile" id="tabsMobile">
    <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
    <button class="tab-btn" data-tab="mealplan">Meal Plan</button>
    <button class="tab-btn" data-tab="recipes">Recipes</button>
    <button class="tab-btn" data-tab="grocery">Grocery</button>
    <button class="tab-btn" data-tab="trackers">Trackers</button>
  </nav>

  <main id="view" class="view"></main>

  <footer class="app-footer">
    Personal nutrition tracker · runs fully offline · data stays on this device
  </footer>
</div>

<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/charts.js"></script>
<script src="js/app.js"></script>
</body>
</html>
